version: 1
name: Simple paused Codex flow
sessions:
  codex:
    agentServerId: codex-acp
nodes:
  input-value:
    kind: input
    num: IN
    title: Input value
    variableName: specflow_value
    defaultValue: "1"
    description: Value used by the arithmetic steps.
  add-one:
    kind: step
    num: "01"
    title: Add one and pause
    prompt: |-
      Do not edit files.
      Calculate 1 + <specflow_value>.
      Reply with the result and one short question that the paused-session composer can answer.
    session: codex
    pauseAfterRun: true
    modeId: auto
  add-two:
    kind: step
    num: "02"
    title: Continue arithmetic
    prompt: |-
      Continue from the paused conversation in this same ACP session.
      Add 2 to the previous result and reply with only the final arithmetic statement.
    session: codex
  done:
    kind: end
    num: END
    title: Done
edges:
  - from: input-value
    to: add-one
  - from: add-one
    to: add-two
  - from: add-two
    to: done
