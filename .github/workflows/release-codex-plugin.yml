name: Release Codex plugin

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Development version component to bump after publishing
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-codex-plugin
  cancel-in-progress: false

env:
  PLUGIN_BRANCH: codex-plugin
  PLUGIN_NAME: specflow-codex
  MARKETPLACE_FILE: .agents/plugins/marketplace.json
  PLUGIN_DIR: plugins/specflow-codex
  MANIFEST_FILE: plugins/specflow-codex/.codex-plugin/plugin.json

jobs:
  publish:
    name: Publish Codex plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Validate plugin files
        run: |
          set -euo pipefail
          test -f "$MARKETPLACE_FILE"
          test -d "$PLUGIN_DIR"
          test -f "$MANIFEST_FILE"

      - name: Prepare plugin artifact
        id: prepare
        run: |
          set -euo pipefail

          publish_dir="$RUNNER_TEMP/codex-plugin-publish"
          current_compare_dir="$RUNNER_TEMP/codex-plugin-current-compare"
          rm -rf "$publish_dir" "$current_compare_dir"

          mkdir -p "$publish_dir/$(dirname "$MARKETPLACE_FILE")" "$publish_dir/plugins"
          cp "$MARKETPLACE_FILE" "$publish_dir/$MARKETPLACE_FILE"
          cp -R "$PLUGIN_DIR" "$publish_dir/plugins/"

          export PUBLISH_DIR="$publish_dir"
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const manifestPath = path.join(process.env.PUBLISH_DIR, process.env.MANIFEST_FILE);
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          const sourceVersion = String(manifest.version ?? "");
          const publishVersion = sourceVersion.split("+")[0];

          if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(publishVersion)) {
            throw new Error(`Invalid Codex plugin version: ${sourceVersion}`);
          }

          manifest.version = publishVersion;
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_version=${sourceVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `publish_version=${publishVersion}\n`);
          NODE

          mkdir -p "$current_compare_dir"
          cp -R "$publish_dir"/. "$current_compare_dir"/
          export COMPARE_MANIFEST="$current_compare_dir/$MANIFEST_FILE"
          node <<'NODE'
          const fs = require("node:fs");

          const manifestPath = process.env.COMPARE_MANIFEST;
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.version = "0.0.0";
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          echo "publish_dir=$publish_dir" >> "$GITHUB_OUTPUT"
          echo "current_compare_dir=$current_compare_dir" >> "$GITHUB_OUTPUT"

      - name: Fetch published plugin branch
        id: branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$PLUGIN_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PLUGIN_BRANCH:refs/remotes/origin/$PLUGIN_BRANCH"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare published comparison
        id: published
        if: ${{ steps.branch.outputs.exists == 'true' }}
        run: |
          set -euo pipefail

          published_dir="$RUNNER_TEMP/codex-plugin-published"
          published_compare_dir="$RUNNER_TEMP/codex-plugin-published-compare"
          rm -rf "$published_dir" "$published_compare_dir"
          mkdir -p "$published_dir" "$published_compare_dir"

          git archive "origin/$PLUGIN_BRANCH" | tar -x -C "$published_dir"
          cp -R "$published_dir"/. "$published_compare_dir"/

          export PUBLISHED_MANIFEST="$published_dir/$MANIFEST_FILE"
          export COMPARE_MANIFEST="$published_compare_dir/$MANIFEST_FILE"
          node <<'NODE'
          const fs = require("node:fs");

          const publishedManifestPath = process.env.PUBLISHED_MANIFEST;
          if (!fs.existsSync(publishedManifestPath)) {
            throw new Error(`Published plugin manifest is missing: ${publishedManifestPath}`);
          }

          const publishedManifest = JSON.parse(fs.readFileSync(publishedManifestPath, "utf8"));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `published_version=${publishedManifest.version}\n`);

          const compareManifestPath = process.env.COMPARE_MANIFEST;
          const compareManifest = JSON.parse(fs.readFileSync(compareManifestPath, "utf8"));
          compareManifest.version = "0.0.0";
          fs.writeFileSync(compareManifestPath, `${JSON.stringify(compareManifest, null, 2)}\n`);
          NODE

          echo "published_compare_dir=$published_compare_dir" >> "$GITHUB_OUTPUT"

      - name: Compare plugin content
        id: compare
        run: |
          set -euo pipefail

          if [ "${{ steps.branch.outputs.exists }}" != "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=published branch does not exist" >> "$GITHUB_OUTPUT"
            echo "No published $PLUGIN_BRANCH branch exists; publishing initial plugin artifact."
            exit 0
          fi

          diff_output="$RUNNER_TEMP/codex-plugin-diff.txt"
          if diff -qr "${{ steps.prepare.outputs.current_compare_dir }}" "${{ steps.published.outputs.published_compare_dir }}" > "$diff_output"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=no non-version changes" >> "$GITHUB_OUTPUT"
            echo "No Codex plugin changes except version."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=non-version changes detected" >> "$GITHUB_OUTPUT"
            cat "$diff_output"
          fi

      - name: Validate version advancement
        if: ${{ steps.compare.outputs.changed == 'true' && steps.branch.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          current="${{ steps.prepare.outputs.publish_version }}"
          published="${{ steps.published.outputs.published_version }}"
          if [ "$current" = "$published" ]; then
            echo "::error::Codex plugin content changed, but publish version is still $current. Merge the dev-version bump PR or bump $MANIFEST_FILE before publishing."
            exit 1
          fi

      - name: Publish plugin branch
        if: ${{ steps.compare.outputs.changed == 'true' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_worktree="$RUNNER_TEMP/codex-plugin-branch"
          rm -rf "$publish_worktree"

          if [ "${{ steps.branch.outputs.exists }}" = "true" ]; then
            git worktree add "$publish_worktree" "origin/$PLUGIN_BRANCH"
            cd "$publish_worktree"
            git switch -C "$PLUGIN_BRANCH" "origin/$PLUGIN_BRANCH"
          else
            git worktree add --detach "$publish_worktree"
            cd "$publish_worktree"
            git switch --orphan "$PLUGIN_BRANCH"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "${{ steps.prepare.outputs.publish_dir }}/." "$publish_worktree/"

          git add -A
          git commit -m "chore: publish $PLUGIN_NAME ${{ steps.prepare.outputs.publish_version }}"
          git push origin "$PLUGIN_BRANCH"

      - name: Open development version bump PR
        id: bump
        if: ${{ steps.compare.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_VERSION: ${{ steps.prepare.outputs.publish_version }}
          BUMP_PART: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          timestamp="$(date -u +%Y%m%d%H%M%S)"
          export TIMESTAMP="$timestamp"

          node <<'NODE'
          const fs = require("node:fs");

          const manifestPath = process.env.MANIFEST_FILE;
          const publishVersion = process.env.PUBLISH_VERSION;
          const bumpPart = process.env.BUMP_PART || "patch";
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(publishVersion);

          if (!match) {
            throw new Error(`Cannot auto-bump non-stable Codex plugin version: ${publishVersion}`);
          }

          let major = Number(match[1]);
          let minor = Number(match[2]);
          let patch = Number(match[3]);

          if (bumpPart === "major") {
            major += 1;
            minor = 0;
            patch = 0;
          } else if (bumpPart === "minor") {
            minor += 1;
            patch = 0;
          } else if (bumpPart === "patch") {
            patch += 1;
          } else {
            throw new Error(`Invalid Codex plugin bump component: ${bumpPart}`);
          }

          const nextDevVersion = `${major}.${minor}.${patch}+codex.${process.env.TIMESTAMP}`;

          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.version = nextDevVersion;
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `next_dev_version=${nextDevVersion}\n`);
          NODE

          next_dev_version="$(node -e 'const fs = require("node:fs"); const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_FILE, "utf8")); process.stdout.write(manifest.version);')"
          echo "next_dev_version=$next_dev_version" >> "$GITHUB_OUTPUT"
          branch_version="${next_dev_version//+/-}"
          branch_version="${branch_version//./-}"
          bump_branch="chore/bump-codex-plugin-$branch_version"

          if git diff --quiet -- "$MANIFEST_FILE"; then
            echo "Codex plugin manifest already uses $next_dev_version."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$bump_branch"
          git add "$MANIFEST_FILE"
          git commit -m "chore: bump Codex plugin dev version to $next_dev_version"
          git push --force-with-lease origin "$bump_branch"

          existing_pr="$(gh pr list --base master --head "$bump_branch" --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            echo "Development version bump PR already exists: $existing_pr"
            exit 0
          fi

          gh pr create \
            --base master \
            --head "$bump_branch" \
            --title "chore: bump Codex plugin dev version to $next_dev_version" \
            --body "Codex plugin ${{ steps.prepare.outputs.publish_version }} was published to \`$PLUGIN_BRANCH\`. This bumps the master development version to \`$next_dev_version\`."
