name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.0.1-beta.3
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-binaries-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and attach binaries
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.release.tag_name || inputs.tag, 'v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release tag
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'; then
            echo "Release tag must be vX.Y.Z, vX.Y.Z-alpha.N, vX.Y.Z-beta.N, or vX.Y.Z-rc.N" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Resolve release version
        id: release-version
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          version="$(bun packages/cli/src/version.ts release-version "$TAG")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set package version for release build
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: bun packages/cli/src/version.ts set-package-version package.json "$RELEASE_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build UI
        run: bun run build:ui

      - name: Generate static UI assets
        run: bun packages/server/scripts/generate-static-ui-assets.ts

      - name: Build binaries
        env:
          SPECFLOW_VERSION: ${{ steps.release-version.outputs.version }}
          AFLOW_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          mkdir -p dist/release
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 windows-x64; do
            mkdir -p "dist/release/specflow-code-$platform"
          done

          bun build --compile --target=bun-darwin-arm64 --sourcemap=none --env=SPECFLOW_* packages/cli/src/specflow.ts --outfile dist/release/specflow-code-darwin-arm64/specflow
          bun build --compile --target=bun-darwin-arm64 --sourcemap=none --env=SPECFLOW_* --env=AFLOW_* packages/aflow/src/cli.ts --outfile dist/release/specflow-code-darwin-arm64/aflow

          bun build --compile --target=bun-darwin-x64 --sourcemap=none --env=SPECFLOW_* packages/cli/src/specflow.ts --outfile dist/release/specflow-code-darwin-x64/specflow
          bun build --compile --target=bun-darwin-x64 --sourcemap=none --env=SPECFLOW_* --env=AFLOW_* packages/aflow/src/cli.ts --outfile dist/release/specflow-code-darwin-x64/aflow

          bun build --compile --target=bun-linux-arm64 --sourcemap=none --env=SPECFLOW_* packages/cli/src/specflow.ts --outfile dist/release/specflow-code-linux-arm64/specflow
          bun build --compile --target=bun-linux-arm64 --sourcemap=none --env=SPECFLOW_* --env=AFLOW_* packages/aflow/src/cli.ts --outfile dist/release/specflow-code-linux-arm64/aflow

          bun build --compile --target=bun-linux-x64-baseline --sourcemap=none --env=SPECFLOW_* packages/cli/src/specflow.ts --outfile dist/release/specflow-code-linux-x64/specflow
          bun build --compile --target=bun-linux-x64-baseline --sourcemap=none --env=SPECFLOW_* --env=AFLOW_* packages/aflow/src/cli.ts --outfile dist/release/specflow-code-linux-x64/aflow

          bun build --compile --target=bun-windows-x64-baseline --sourcemap=none --env=SPECFLOW_* packages/cli/src/specflow.ts --outfile dist/release/specflow-code-windows-x64/specflow.exe
          bun build --compile --target=bun-windows-x64-baseline --sourcemap=none --env=SPECFLOW_* --env=AFLOW_* packages/aflow/src/cli.ts --outfile dist/release/specflow-code-windows-x64/aflow.exe

      - name: Package binaries
        working-directory: dist/release
        run: |
          chmod +x specflow-code-darwin-arm64/specflow specflow-code-darwin-arm64/aflow
          chmod +x specflow-code-darwin-x64/specflow specflow-code-darwin-x64/aflow
          chmod +x specflow-code-linux-arm64/specflow specflow-code-linux-arm64/aflow
          chmod +x specflow-code-linux-x64/specflow specflow-code-linux-x64/aflow
          tar -czf specflow-code-darwin-arm64.tar.gz -C specflow-code-darwin-arm64 specflow aflow
          tar -czf specflow-code-darwin-x64.tar.gz -C specflow-code-darwin-x64 specflow aflow
          tar -czf specflow-code-linux-arm64.tar.gz -C specflow-code-linux-arm64 specflow aflow
          tar -czf specflow-code-linux-x64.tar.gz -C specflow-code-linux-x64 specflow aflow
          (cd specflow-code-windows-x64 && zip -9 ../specflow-code-windows-x64.zip specflow.exe aflow.exe)
          shasum -a 256 specflow-code-*.tar.gz specflow-code-*.zip > SHA256SUMS

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "$TAG" \
            dist/release/specflow-code-darwin-arm64.tar.gz \
            dist/release/specflow-code-darwin-x64.tar.gz \
            dist/release/specflow-code-linux-arm64.tar.gz \
            dist/release/specflow-code-linux-x64.tar.gz \
            dist/release/specflow-code-windows-x64.zip \
            dist/release/SHA256SUMS \
            --clobber

  bump-snapshot-pr:
    name: Open snapshot bump PR
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Resolve snapshot bump
        id: snapshot
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          expected="$(bun packages/cli/src/version.ts expected-snapshot "$TAG")"
          current="$(bun packages/cli/src/version.ts package-version package.json)"
          echo "expected=$expected" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Release $TAG expects master package.json version $expected; current master has $current."
          if [ "$current" = "$expected" ]; then
            echo "create_pr=false" >> "$GITHUB_OUTPUT"
            echo "master already uses $expected"
          else
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "branch=chore/bump-version-$expected" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package version
        if: ${{ steps.snapshot.outputs.create_pr == 'true' }}
        env:
          EXPECTED_VERSION: ${{ steps.snapshot.outputs.expected }}
        run: bun packages/cli/src/version.ts set-package-version package.json "$EXPECTED_VERSION"

      - name: Create pull request
        if: ${{ steps.snapshot.outputs.create_pr == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.snapshot.outputs.branch }}
          EXPECTED_VERSION: ${{ steps.snapshot.outputs.expected }}
          CURRENT_VERSION: ${{ steps.snapshot.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add package.json
          git commit -m "chore: bump version to $EXPECTED_VERSION"
          git push --force-with-lease origin "$BRANCH"
          existing_pr="$(gh pr list --base master --head "$BRANCH" --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            echo "Snapshot bump PR already exists: $existing_pr"
            exit 0
          fi
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore: bump version to $EXPECTED_VERSION" \
            --body "Release completed. This updates master from $CURRENT_VERSION to $EXPECTED_VERSION." \
            || {
              echo "::error::Snapshot bump branch was pushed, but GitHub refused to create the PR. Enable Settings > Actions > General > Workflow permissions > 'Allow GitHub Actions to create and approve pull requests'."
              echo "::notice::Manual PR URL: https://github.com/${{ github.repository }}/pull/new/$BRANCH"
              exit 1
            }
